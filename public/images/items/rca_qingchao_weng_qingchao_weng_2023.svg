<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F7DC6F;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#F39C12;stop-opacity:0.85"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="0"/>
  <!-- Decorative circles -->
  <circle cx="85%" cy="15%" r="120" fill="rgba(255,255,255,0.07)"/>
  <circle cx="15%" cy="85%" r="80" fill="rgba(0,0,0,0.04)"/>
  <!-- Source badge -->
  <rect x="24" y="24" width="auto" height="28" rx="6" fill="rgba(0,0,0,0.2)"/>
  <text x="40" y="44" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="rgba(255,255,255,0.8)" letter-spacing="0.04em">Royal College of Art</text>
  <!-- Initials -->
  <text x="50%" y="55%" text-anchor="middle" font-family="system-ui, sans-serif" font-size="72" font-weight="700" fill="rgba(255,255,255,0.85)" letter-spacing="0.02em">QW</text>
  <!-- Title at bottom -->
  <text x="50%" y="88%" text-anchor="middle" font-family="system-ui, sans-serif" font-size="18" font-weight="500" fill="rgba(255,255,255,0.6)">
    <tspan x="50%" dy="0">Qingchao Weng</tspan>
  </text>
</svg>